name: Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths: [ 'mobile/**', '.github/workflows/android.yml', 'scripts/bootstrap-android.sh' ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }

      - uses: actions/setup-node@v4
        with: { node-version: '18' }

      - name: Install JS deps
        working-directory: mobile
        run: npm ci || npm install

      # Firebase è opzionale: lo configuriamo solo se il secret esiste (controllo nella run,
      # non in un `if:` con context secrets — quello non è ammesso da Actions).
      - name: Optional Firebase config (push notifications)
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            mkdir -p mobile/android/app
            echo "$GOOGLE_SERVICES_JSON" | base64 -d > mobile/android/app/google-services.json
            echo "Firebase config installato."
          else
            echo "Nessun google-services.json: push Firebase disattivate (build comunque OK)."
          fi

      - name: Bootstrap Android boilerplate (da template RN 0.73.9)
        run: bash scripts/bootstrap-android.sh mobile

      - name: Ensure Gradle wrapper
        working-directory: mobile/android
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then gradle wrapper --gradle-version 8.3 || true; fi
          chmod +x gradlew || true

      - name: Build debug APK (installabile, self-signed)
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK debug
        uses: actions/upload-artifact@v4
        with:
          name: ii-private-messenger-android-debug
          path: mobile/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      # APK RELEASE: impacchetta il bundle JS -> funziona STANDALONE (niente Metro).
      # Firma col keystore di produzione se i secret ci sono, altrimenti con la chiave debug
      # del template (comunque installabile per sideload/test).
      - name: Build RELEASE APK (JS bundled, standalone)
        working-directory: mobile/android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ORG_GRADLE_PROJECT_IIMSG_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_IIMSG_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_IIMSG_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > app/iimsg-release.keystore
            echo "Keystore di produzione presente."
          else
            echo "Nessun keystore di produzione: il release verra' firmato con la chiave debug del template (installabile per test)."
          fi
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK release (se presente)
        uses: actions/upload-artifact@v4
        with:
          name: ii-private-messenger-android-release
          path: mobile/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: ignore
