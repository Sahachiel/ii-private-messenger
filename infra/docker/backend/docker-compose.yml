version: '3.8'

services:
  backend:
    build: ../../../backend
    restart: always
    # DUE env_file: infra/.env (POSTGRES_*/REDIS_PASSWORD per i container) + backend/.env
    # (DATABASE_URL/REDIS_URL con password per l'app). Il secondo era stato perso: senza,
    # DATABASE_URL/REDIS_URL restano vuoti e il config ripiega su localhost -> ECONNREFUSED.
    env_file:
      - .env
      - ../../../backend/.env
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ii_private_messenger
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../../backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
