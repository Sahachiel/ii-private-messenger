version: '3.8'

services:
  relay:
    build: ../../../relay
    restart: always
    # Due env_file come il backend: infra/.env (REDIS_PASSWORD per i container) + relay/.env
    # (REDIS_URL/INTER_NODE_SECRET/config app). Senza il secondo, le var app restano vuote.
    env_file:
      - .env
      - ../../../relay/.env
    environment:
      NODE_REGION: ru
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  coturn:
    image: coturn/coturn:latest
    restart: always
    network_mode: host
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - coturn_logs:/var/log/turnserver

volumes:
  redis_data:
  coturn_logs:
